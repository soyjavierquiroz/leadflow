version: "3.9"

services:
  web:
    image: leadflow-web:latest
    # ELIMINADO: env_file para evitar el error de Portainer
    environment:
      NEXT_PUBLIC_APP_NAME: "Leadflow"
      NEXT_PUBLIC_APP_ENV: "${APP_ENV:-staging}"
      NEXT_PUBLIC_APP_BASE_DOMAIN: "${APP_BASE_DOMAIN:-leadflow.kuruk.in}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_SITE_URL: "${SITE_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_MEMBERS_URL: "${MEMBERS_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_ADMIN_URL: "${ADMIN_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_API_URL: "${API_URL:-https://api.leadflow.kuruk.in}"
      # ✅ AJUSTADO: Host interno para comunicación entre servicios del mismo stack
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://leadflow_api:3001}"
      NEXT_PUBLIC_SAAS_CUSTOMER_CNAME_TARGET: "${CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET:-customers.leadflow.kuruk.in}"
      NEXT_PUBLIC_SAAS_FALLBACK_ORIGIN: "${CLOUDFLARE_SAAS_FALLBACK_ORIGIN:-proxy-fallback.leadflow.kuruk.in}"
      DATABASE_URL: "${DATABASE_URL}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Kurukin LeadFlow}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-}"
      MAIL_REPLY_TO_ADDRESS: "${MAIL_REPLY_TO_ADDRESS:-}"
      PORT: "3000"
    networks:
      - traefik_public
      - general_network
    deploy:
      replicas: ${LEADFLOW_WEB_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.leadflow-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.leadflow-site.rule=Host(`${LEADFLOW_SITE_HOST:-leadflow.kuruk.in}`)"
        - "traefik.http.routers.leadflow-site.priority=200"
        - "traefik.http.routers.leadflow-site.entrypoints=websecure"
        - "traefik.http.routers.leadflow-site.tls=true"
        - "traefik.http.routers.leadflow-site.tls.certresolver=le"
        - "traefik.http.routers.leadflow-site.service=leadflow-web"
        - "traefik.http.routers.leadflow-public.rule=HostRegexp(`{host:.+}`) && !HostRegexp(`{sub:.+}.kuruk.in`) && !Host(`kuruk.in`)"
        - "traefik.http.routers.leadflow-public.priority=1"
        - "traefik.http.routers.leadflow-public.entrypoints=websecure"
        - "traefik.http.routers.leadflow-public.tls=true"
        - "traefik.http.routers.leadflow-public.tls.certresolver=le"
        - "traefik.http.routers.leadflow-public.tls.domains[0].main=${LEADFLOW_SAAS_CUSTOMERS_HOST:-customers.leadflow.kuruk.in}"
        - "traefik.http.routers.leadflow-public.tls.domains[0].sans=${LEADFLOW_SAAS_FALLBACK_HOST:-proxy-fallback.leadflow.kuruk.in}"
        - "traefik.http.routers.leadflow-public.service=leadflow-web"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: leadflow-api:latest
    environment:
      NODE_ENV: "production"
      APP_ENV: "${APP_ENV:-staging}"
      APP_BASE_DOMAIN: "${APP_BASE_DOMAIN:-leadflow.kuruk.in}"
      API_NAME: "leadflow-api"
      API_VERSION: "0.2.0"
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      API_GLOBAL_PREFIX: "v1"
      API_BASE_URL: "${API_URL:-https://api.leadflow.kuruk.in}"
      AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME:-leadflow_session}"
      DATABASE_URL: "${DATABASE_URL}"
      SSO_BLACKLIST_SECRET: "${SSO_BLACKLIST_SECRET:-sso_live_8x7y6z5w4v3u2t1s0r9q}"
      KURUKIN_BLACKLIST_API_TOKEN: "${KURUKIN_BLACKLIST_API_TOKEN}"
      # ✅ CORREGIDO: DNS interno validado con PING para n8n
      N8N_WEBHOOK_INTERNAL_BASE: "${N8N_WEBHOOK_INTERNAL_BASE:-http://n8n_n8n_v2_webhook:5678/webhook}"
      N8N_DISPATCHER_WEBHOOK_URL: "${N8N_DISPATCHER_WEBHOOK_URL:-http://n8n_n8n_v2_webhook:5678/webhook/channels/dispatcher/lead-context-upsert}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET}"
      # ✅ CORREGIDO: DNS interno para Runtime Context (Stack_Service)
      RUNTIME_CONTEXT_CENTRAL_BASE_URL: "${RUNTIME_CONTEXT_CENTRAL_BASE_URL:-http://runtime-context_runtime_context_service:8080}"
      RUNTIME_CONTEXT_CENTRAL_API_KEY: "${RUNTIME_CONTEXT_CENTRAL_API_KEY}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-https://myminioback.kuruk.in}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_PUBLIC_URL: "${MINIO_PUBLIC_URL:-https://cdn.kuruk.in}"
      SITE_URL: "${SITE_URL:-https://leadflow.kuruk.in}"
      MEMBERS_URL: "${MEMBERS_URL:-https://leadflow.kuruk.in}"
      ADMIN_URL: "${ADMIN_URL:-https://leadflow.kuruk.in}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://leadflow.kuruk.in}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Kurukin LeadFlow}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-}"
      MAIL_REPLY_TO_ADDRESS: "${MAIL_REPLY_TO_ADDRESS:-}"
      # --- VARIABLES EVOLUTION MODULE ---
      EVOLUTION_API_URL: "${EVOLUTION_API_URL:-http://evolution_evolution_api:8080}"
      EVOLUTION_GLOBAL_KEY: "${EVOLUTION_GLOBAL_KEY}"
      N8N_WEBHOOK_BASE_URL: "${N8N_WEBHOOK_BASE_URL:-http://n8n_n8n_v2_webhook:5678}"
      N8N_EVOLUTION_WEBHOOK_ID: "${N8N_EVOLUTION_WEBHOOK_ID:-7feee028-e25e-43a3-abac-1a0bf7b0ccf4}"
      RUNTIME_CONTEXT_URL: "${RUNTIME_CONTEXT_CENTRAL_BASE_URL:-http://runtime-context_runtime_context_service:8080}"
      RUNTIME_CONTEXT_INTERNAL_KEY: "${RUNTIME_CONTEXT_CENTRAL_API_KEY}"
      # ✅ WALLET ENGINE: Usando el host real kurukin-wallet_wallet-api
      WALLET_ENGINE_BASE_URL: "${WALLET_ENGINE_BASE_URL:-http://kurukin-wallet_wallet-api:3000}"
      WALLET_ENGINE_INTERNAL_URL: "${WALLET_ENGINE_INTERNAL_URL:-http://kurukin-wallet_wallet-api:3000}"
      WALLET_ENGINE_API_KEY: "${WALLET_ENGINE_API_KEY:-}"
      # ---------------------------------------------------------
    networks:
      - traefik_public
      - general_network
    deploy:
      replicas: ${LEADFLOW_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.leadflow-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.leadflow-api.rule=Host(`${LEADFLOW_API_HOST:-api.leadflow.kuruk.in}`)"
        - "traefik.http.routers.leadflow-api.priority=200"
        - "traefik.http.routers.leadflow-api.entrypoints=websecure"
        - "traefik.http.routers.leadflow-api.tls=true"
        - "traefik.http.routers.leadflow-api.tls.certresolver=le"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  traefik_public:
    external: true
  general_network:
    external: true
