version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadflow}
      POSTGRES_USER: ${POSTGRES_USER:-leadflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadflow}
    networks:
      - leadflow_core
    volumes:
      - leadflow_postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-leadflow} -d ${POSTGRES_DB:-leadflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: leadflow-web:0.1.0-local
    environment:
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-staging}
      NEXT_PUBLIC_APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-leadflow.kurukin.com}
      NEXT_PUBLIC_APP_NAME: Leadflow
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://leadflow.kurukin.com}
      NEXT_PUBLIC_MEMBERS_URL: ${MEMBERS_URL:-https://leadflow.kurukin.com}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-https://leadflow.kurukin.com}
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.leadflow.kurukin.com}
    networks:
      - traefik_public
      - leadflow_core
    deploy:
      replicas: ${LEADFLOW_WEB_REPLICAS:-1}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.leadflow-web.loadbalancer.server.port=3000
        - traefik.http.routers.leadflow-site.rule=Host(`${LEADFLOW_SITE_HOST:-leadflow.kurukin.com}`)
        - traefik.http.routers.leadflow-site.priority=200
        - traefik.http.routers.leadflow-site.entrypoints=websecure
        - traefik.http.routers.leadflow-site.tls=true
        - traefik.http.routers.leadflow-site.tls.certresolver=le
        - traefik.http.routers.leadflow-site.service=leadflow-web
        - traefik.http.routers.leadflow-public.rule=HostRegexp(`{host:.+}`)
        - traefik.http.routers.leadflow-public.priority=1
        - traefik.http.routers.leadflow-public.entrypoints=websecure
        - traefik.http.routers.leadflow-public.tls=true
        - traefik.http.routers.leadflow-public.tls.certresolver=le
        - traefik.http.routers.leadflow-public.tls.domains[0].main=${LEADFLOW_SAAS_CUSTOMERS_HOST:-customers.leadflow.kurukin.com}
        - traefik.http.routers.leadflow-public.tls.domains[0].sans=${LEADFLOW_SAAS_FALLBACK_HOST:-proxy-fallback.leadflow.kurukin.com}
        - traefik.http.routers.leadflow-public.service=leadflow-web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/favicon.ico >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: leadflow-api:0.1.0-local
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-staging}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-leadflow.kurukin.com}
      API_NAME: leadflow-api
      API_VERSION: 0.2.0
      API_HOST: 0.0.0.0
      API_PORT: 3001
      API_GLOBAL_PREFIX: v1
      API_BASE_URL: ${API_URL:-https://api.leadflow.kurukin.com}
      SITE_URL: ${SITE_URL:-https://leadflow.kurukin.com}
      MEMBERS_URL: ${MEMBERS_URL:-https://leadflow.kurukin.com}
      ADMIN_URL: ${ADMIN_URL:-https://leadflow.kurukin.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://leadflow.kurukin.com}
      DATABASE_URL: ${DATABASE_URL:-}
      EVOLUTION_API_INTERNAL_BASE_URL: ${EVOLUTION_API_INTERNAL_BASE_URL:-http://evolution_api_v2:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      CLOUDFLARE_SAAS_FALLBACK_ORIGIN: ${CLOUDFLARE_SAAS_FALLBACK_ORIGIN:-proxy-fallback.leadflow.kurukin.com}
      CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET: ${CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET:-customers.leadflow.kurukin.com}

      # Cables de n8n y automatizaciones internas.
      N8N_WEBHOOK_INTERNAL_BASE: ${N8N_WEBHOOK_INTERNAL_BASE:-http://n8n-v2_n8n_v2_webhook:5678/webhook}
      N8N_BASE_DOMAIN: ${N8N_BASE_DOMAIN:-kn8nv2.kurukin.com}
      N8N_WEBHOOK_SCHEME: ${N8N_WEBHOOK_SCHEME:-https}
      N8N_WEBHOOK_BASE_PATH: ${N8N_WEBHOOK_BASE_PATH:-/webhook}
      N8N_WEBHOOK_ID: ${N8N_WEBHOOK_ID:-7feee028-e25e-43a3-abac-1a0bf7b0ccf4}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
      N8N_DISPATCHER_WEBHOOK_URL: ${N8N_DISPATCHER_WEBHOOK_URL}
      N8N_DISPATCHER_API_KEY: ${N8N_DISPATCHER_API_KEY}
      RUNTIME_CONTEXT_CENTRAL_BASE_URL: ${RUNTIME_CONTEXT_CENTRAL_BASE_URL:-}
      RUNTIME_CONTEXT_REGISTER_PATH: ${RUNTIME_CONTEXT_REGISTER_PATH:-/register}
      RUNTIME_CONTEXT_RESOLVE_FULL_PATH: ${RUNTIME_CONTEXT_RESOLVE_FULL_PATH:-/resolve-full}
      RUNTIME_CONTEXT_CENTRAL_API_KEY: ${RUNTIME_CONTEXT_CENTRAL_API_KEY:-}
      RUNTIME_CONTEXT_REQUEST_TIMEOUT_MS: ${RUNTIME_CONTEXT_REQUEST_TIMEOUT_MS:-5000}
      RUNTIME_CONTEXT_RESOLVE_RETRIES: ${RUNTIME_CONTEXT_RESOLVE_RETRIES:-5}
      RUNTIME_CONTEXT_RESOLVE_DELAY_MS: ${RUNTIME_CONTEXT_RESOLVE_DELAY_MS:-1000}
      MESSAGING_AUTOMATION_WEBHOOK_BASE_URL: ${MESSAGING_AUTOMATION_WEBHOOK_BASE_URL:-http://leadflow_api:3001}
      N8N_AUTOMATION_WEBHOOK_BASE_URL: ${N8N_AUTOMATION_WEBHOOK_BASE_URL:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-https://kminioback.kurukin.com}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://cdn.kurukin.com}

    networks:
      - traefik_public
      - general_network
      - leadflow_core
      - leadflow_automation
    deploy:
      replicas: ${LEADFLOW_API_REPLICAS:-1}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.leadflow-api.loadbalancer.server.port=3001
        - traefik.http.routers.leadflow-api.rule=Host(`${LEADFLOW_API_HOST:-api.leadflow.kurukin.com}`)
        - traefik.http.routers.leadflow-api.priority=200
        - traefik.http.routers.leadflow-api.entrypoints=websecure
        - traefik.http.routers.leadflow-api.tls=true
        - traefik.http.routers.leadflow-api.tls.certresolver=le
        - traefik.http.routers.leadflow-api.service=leadflow-api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  traefik_public:
    external: true
  general_network:
    external: true
  leadflow_core:
    driver: overlay
    attachable: true
  leadflow_automation:
    driver: overlay
    attachable: true

volumes:
  leadflow_postgres_data:
