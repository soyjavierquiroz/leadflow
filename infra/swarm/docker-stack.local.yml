version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadflow}
      POSTGRES_USER: ${POSTGRES_USER:-leadflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadflow}
    networks:
      - leadflow_core
    volumes:
      - leadflow_postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-leadflow} -d ${POSTGRES_DB:-leadflow}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: leadflow-web:0.1.0-local
    environment:
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-staging}
      NEXT_PUBLIC_APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-staging.example.com}
      NEXT_PUBLIC_APP_NAME: Leadflow
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://staging.example.com}
      NEXT_PUBLIC_MEMBERS_URL: ${MEMBERS_URL:-https://members.staging.example.com}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-https://admin.staging.example.com}
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.staging.example.com}
    networks:
      - traefik_public
      - leadflow_core
    deploy:
      replicas: ${LEADFLOW_WEB_REPLICAS:-1}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.leadflow-web.loadbalancer.server.port=3000
        - traefik.http.routers.leadflow-public.rule=HostRegexp(`{host:.+}`)
        - traefik.http.routers.leadflow-public.priority=1
        - traefik.http.routers.leadflow-public.entrypoints=websecure
        - traefik.http.routers.leadflow-public.tls=true
        - traefik.http.routers.leadflow-public.tls.certresolver=le
        - traefik.http.routers.leadflow-public.tls.domains[0].main=${LEADFLOW_SAAS_CUSTOMERS_HOST:-customers.staging.example.com}
        - traefik.http.routers.leadflow-public.tls.domains[0].sans=${LEADFLOW_SAAS_FALLBACK_HOST:-proxy-fallback.staging.example.com},${LEADFLOW_SITE_HOST:-staging.example.com}
        - traefik.http.routers.leadflow-public.service=leadflow-web
        - traefik.http.routers.leadflow-members.rule=Host(`${LEADFLOW_MEMBERS_HOST:-members.staging.example.com}`)
        - traefik.http.routers.leadflow-members.priority=200
        - traefik.http.routers.leadflow-members.entrypoints=websecure
        - traefik.http.routers.leadflow-members.tls=true
        - traefik.http.routers.leadflow-members.tls.certresolver=le
        - traefik.http.routers.leadflow-members.service=leadflow-web
        - traefik.http.routers.leadflow-admin.rule=Host(`${LEADFLOW_ADMIN_HOST:-admin.staging.example.com}`)
        - traefik.http.routers.leadflow-admin.priority=200
        - traefik.http.routers.leadflow-admin.entrypoints=websecure
        - traefik.http.routers.leadflow-admin.tls=true
        - traefik.http.routers.leadflow-admin.tls.certresolver=le
        - traefik.http.routers.leadflow-admin.service=leadflow-web
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: leadflow-api:0.1.0-local
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-staging}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-staging.example.com}
      API_NAME: leadflow-api
      API_VERSION: 0.2.0
      API_HOST: 0.0.0.0
      API_PORT: 3001
      API_GLOBAL_PREFIX: v1
      API_BASE_URL: ${API_URL:-https://api.staging.example.com}
      SITE_URL: ${SITE_URL:-https://staging.example.com}
      MEMBERS_URL: ${MEMBERS_URL:-https://members.staging.example.com}
      ADMIN_URL: ${ADMIN_URL:-https://admin.staging.example.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.example.com,https://members.staging.example.com,https://admin.staging.example.com}
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadflow}:${POSTGRES_PASSWORD:-leadflow}@db:5432/${POSTGRES_DB:-leadflow}?schema=public
      CLOUDFLARE_SAAS_FALLBACK_ORIGIN: ${CLOUDFLARE_SAAS_FALLBACK_ORIGIN:-proxy-fallback.staging.example.com}
      CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET: ${CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET:-customers.staging.example.com}
    networks:
      - traefik_public
      - leadflow_core
      - leadflow_automation
    deploy:
      replicas: ${LEADFLOW_API_REPLICAS:-1}
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.services.leadflow-api.loadbalancer.server.port=3001
        - traefik.http.routers.leadflow-api.rule=Host(`${LEADFLOW_API_HOST:-api.staging.example.com}`)
        - traefik.http.routers.leadflow-api.priority=200
        - traefik.http.routers.leadflow-api.entrypoints=websecure
        - traefik.http.routers.leadflow-api.tls=true
        - traefik.http.routers.leadflow-api.tls.certresolver=le
        - traefik.http.routers.leadflow-api.service=leadflow-api
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  traefik_public:
    external: true
  leadflow_core:
    driver: overlay
    attachable: true
  # Placeholder para integraciones internas futuras (n8n/Evolution/workers)
  leadflow_automation:
    driver: overlay
    attachable: true

volumes:
  leadflow_postgres_data:
