version: "3.9"

services:
  web:
    image: leadflow-web:latest
    environment:
      NEXT_PUBLIC_APP_NAME: "Leadflow"
      NEXT_PUBLIC_APP_ENV: "${APP_ENV:-staging}"
      NEXT_PUBLIC_APP_BASE_DOMAIN: "${APP_BASE_DOMAIN:-leadflow.kuruk.in}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_SITE_URL: "${SITE_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_MEMBERS_URL: "${MEMBERS_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_ADMIN_URL: "${ADMIN_URL:-https://leadflow.kuruk.in}"
      NEXT_PUBLIC_API_URL: "${API_URL:-https://api.leadflow.kuruk.in}"
      API_INTERNAL_BASE_URL: "${API_INTERNAL_BASE_URL:-http://leadflow_api:3001}"
      NEXT_PUBLIC_SAAS_CUSTOMER_CNAME_TARGET: "${CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET:-customers.leadflow.kuruk.in}"
      NEXT_PUBLIC_SAAS_FALLBACK_ORIGIN: "${CLOUDFLARE_SAAS_FALLBACK_ORIGIN:-proxy-fallback.leadflow.kuruk.in}"
      DATABASE_URL: "${DATABASE_URL}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Kurukin LeadFlow}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-}"
      MAIL_REPLY_TO_ADDRESS: "${MAIL_REPLY_TO_ADDRESS:-}"
      PORT: "3000"
    networks:
      - traefik_public
      - general_network
    deploy:
      replicas: ${LEADFLOW_WEB_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.leadflow-web.loadbalancer.server.port=3000"

        # Router: leadflow-site
        - "traefik.http.routers.leadflow-site.rule=Host(`${LEADFLOW_SITE_HOST:-leadflow.kuruk.in}`)"
        - "traefik.http.routers.leadflow-site.priority=200"
        - "traefik.http.routers.leadflow-site.entrypoints=websecure"
        - "traefik.http.routers.leadflow-site.tls=true"
        - "traefik.http.routers.leadflow-site.tls.certresolver=le"
        - "traefik.http.routers.leadflow-site.service=leadflow-web"

        # Router: leadflow-public (Catch-All con exclusiones para kuruk.in)
        - "traefik.http.routers.leadflow-public.rule=HostRegexp(`{host:.+}`) && !HostRegexp(`{sub:.+}.kuruk.in`) && !Host(`kuruk.in`)"
        - "traefik.http.routers.leadflow-public.priority=1"
        - "traefik.http.routers.leadflow-public.entrypoints=websecure"
        - "traefik.http.routers.leadflow-public.tls=true"
        - "traefik.http.routers.leadflow-public.tls.certresolver=le"
        - "traefik.http.routers.leadflow-public.tls.domains[0].main=${LEADFLOW_SAAS_CUSTOMERS_HOST:-customers.leadflow.kuruk.in}"
        - "traefik.http.routers.leadflow-public.tls.domains[0].sans=${LEADFLOW_SAAS_FALLBACK_HOST:-proxy-fallback.leadflow.kuruk.in}"
        - "traefik.http.routers.leadflow-public.service=leadflow-web"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('net');const s=net.connect(3000,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: leadflow-api:latest
    environment:
      NODE_ENV: "production"
      APP_ENV: "${APP_ENV:-staging}"
      APP_BASE_DOMAIN: "${APP_BASE_DOMAIN:-leadflow.kuruk.in}"
      API_NAME: "leadflow-api"
      API_VERSION: "0.2.0"
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      API_GLOBAL_PREFIX: "v1"
      API_BASE_URL: "${API_URL:-https://api.leadflow.kuruk.in}"
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL}
      AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME:-leadflow_session}"
      AUTH_SESSION_TTL_DAYS: "${AUTH_SESSION_TTL_DAYS:-7}"
      DATABASE_URL: "${DATABASE_URL}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
      CLOUDFLARE_ZONE_ID: "${CLOUDFLARE_ZONE_ID:-}"
      CLOUDFLARE_SAAS_FALLBACK_ORIGIN: "${CLOUDFLARE_SAAS_FALLBACK_ORIGIN:-proxy-fallback.leadflow.kuruk.in}"
      CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET: "${CLOUDFLARE_SAAS_CUSTOMER_CNAME_TARGET:-customers.leadflow.kuruk.in}"
      CLOUDFLARE_API_BASE_URL: "${CLOUDFLARE_API_BASE_URL:-https://api.cloudflare.com/client/v4}"
      CLOUDFLARE_REQUEST_TIMEOUT_MS: "${CLOUDFLARE_REQUEST_TIMEOUT_MS:-10000}"
      EVOLUTION_API_INTERNAL_BASE_URL: "${EVOLUTION_API_INTERNAL_BASE_URL:-http://evolution_api_v2:8080}"
      EVOLUTION_API_PUBLIC_BASE_URL: "${EVOLUTION_API_PUBLIC_BASE_URL:-}"
      EVOLUTION_API_BASE_URL: "${EVOLUTION_API_BASE_URL:-}"
      EVOLUTION_API_KEY: "${EVOLUTION_API_KEY:-}"
      EVOLUTION_INSTANCE_PREFIX: "${EVOLUTION_INSTANCE_PREFIX:-leadflow}"
      N8N_WEBHOOK_INTERNAL_BASE: "${N8N_WEBHOOK_INTERNAL_BASE:-http://n8n_v2_webhook:5678/webhook}"
      N8N_BASE_DOMAIN: "${N8N_BASE_DOMAIN:-kn8nv2.kuruk.in}"
      N8N_WEBHOOK_SCHEME: "${N8N_WEBHOOK_SCHEME:-https}"
      N8N_WEBHOOK_BASE_PATH: "${N8N_WEBHOOK_BASE_PATH:-/webhook}"
      N8N_WEBHOOK_ID: "${N8N_WEBHOOK_ID:-7feee028-e25e-43a3-abac-1a0bf7b0ccf4}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:-}"
      N8N_DISPATCHER_WEBHOOK_URL: "${N8N_DISPATCHER_WEBHOOK_URL:-http://n8n_v2_webhook:5678/webhook/channels/dispatcher/lead-context-upsert}"
      N8N_DISPATCHER_API_KEY: "${N8N_DISPATCHER_API_KEY:-}"
      N8N_OUTBOUND_WEBHOOK_URL: "${N8N_OUTBOUND_WEBHOOK_URL:-http://n8n_v2_webhook:5678/webhook/channels/outbound/lead-rescue}"
      INCOMING_MESSAGING_WEBHOOK_SECRET: "${INCOMING_MESSAGING_WEBHOOK_SECRET:-}"
      SSO_BLACKLIST_SECRET: "${SSO_BLACKLIST_SECRET:-}"
      KURUKIN_BLACKLIST_API_TOKEN: "${KURUKIN_BLACKLIST_API_TOKEN:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Kurukin LeadFlow}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-}"
      MAIL_REPLY_TO_ADDRESS: "${MAIL_REPLY_TO_ADDRESS:-}"
      WALLET_ENGINE_BASE_URL: "${WALLET_ENGINE_BASE_URL:-}"
      WALLET_ENGINE_INTERNAL_URL: "${WALLET_ENGINE_INTERNAL_URL:-}"
      WALLET_ENGINE_API_KEY: "${WALLET_ENGINE_API_KEY:-}"
      RUNTIME_CONTEXT_CENTRAL_BASE_URL: "${RUNTIME_CONTEXT_CENTRAL_BASE_URL:-http://runtime_context_service:8080}"
      RUNTIME_CONTEXT_MODE: "${RUNTIME_CONTEXT_MODE:-required}"
      RUNTIME_CONTEXT_REGISTER_PATH: "${RUNTIME_CONTEXT_REGISTER_PATH:-/register}"
      RUNTIME_CONTEXT_RESOLVE_FULL_PATH: "${RUNTIME_CONTEXT_RESOLVE_FULL_PATH:-/resolve-full}"
      RUNTIME_CONTEXT_CENTRAL_API_KEY: "${RUNTIME_CONTEXT_CENTRAL_API_KEY:-}"
      RUNTIME_CONTEXT_REQUEST_TIMEOUT_MS: "${RUNTIME_CONTEXT_REQUEST_TIMEOUT_MS:-5000}"
      RUNTIME_CONTEXT_RESOLVE_RETRIES: "${RUNTIME_CONTEXT_RESOLVE_RETRIES:-5}"
      RUNTIME_CONTEXT_RESOLVE_DELAY_MS: "${RUNTIME_CONTEXT_RESOLVE_DELAY_MS:-1000}"
      MESSAGING_AUTOMATION_WEBHOOK_BASE_URL: "${MESSAGING_AUTOMATION_WEBHOOK_BASE_URL:-http://leadflow_api:3001}"
      N8N_AUTOMATION_WEBHOOK_BASE_URL: "${N8N_AUTOMATION_WEBHOOK_BASE_URL:-}"
      MESSAGING_AUTOMATION_WEBHOOK_TOKEN: "${MESSAGING_AUTOMATION_WEBHOOK_TOKEN:-}"
      MESSAGING_AUTOMATION_DISPATCH_TIMEOUT_MS: "${MESSAGING_AUTOMATION_DISPATCH_TIMEOUT_MS:-4000}"
      MESSAGING_AUTOMATION_DISPATCH_RETRIES: "${MESSAGING_AUTOMATION_DISPATCH_RETRIES:-1}"
      EVOLUTION_REQUEST_TIMEOUT_MS: "${EVOLUTION_REQUEST_TIMEOUT_MS:-15000}"
      EVOLUTION_REQUEST_RETRIES: "${EVOLUTION_REQUEST_RETRIES:-2}"
      EVOLUTION_QR_POLL_ATTEMPTS: "${EVOLUTION_QR_POLL_ATTEMPTS:-5}"
      EVOLUTION_QR_POLL_DELAY_MS: "${EVOLUTION_QR_POLL_DELAY_MS:-1000}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-https://myminioback.kuruk.in}"
      MINIO_REGION: "${MINIO_REGION:-us-east-1}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-}"
      MINIO_PUBLIC_URL: "${MINIO_PUBLIC_URL:-https://cdn.kuruk.in}"
      SITE_URL: "${SITE_URL:-https://leadflow.kuruk.in}"
      MEMBERS_URL: "${MEMBERS_URL:-https://leadflow.kuruk.in}"
      ADMIN_URL: "${ADMIN_URL:-https://leadflow.kuruk.in}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://leadflow.kuruk.in}"
    networks:
      - traefik_public
      - general_network
    deploy:
      replicas: ${LEADFLOW_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.leadflow-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.leadflow-api.rule=Host(`${LEADFLOW_API_HOST:-api.leadflow.kuruk.in}`)"
        - "traefik.http.routers.leadflow-api.priority=200"
        - "traefik.http.routers.leadflow-api.entrypoints=websecure"
        - "traefik.http.routers.leadflow-api.tls=true"
        - "traefik.http.routers.leadflow-api.tls.certresolver=le"
        - "traefik.http.routers.leadflow-api.service=leadflow-api"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  traefik_public:
    external: true
  general_network:
    external: true
